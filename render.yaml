services:
  - type: web
    name: discord-alpha-bot
    env: node
    plan: free
    region: oregon
    rootDir: artifacts/api-server
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.26.1 --activate
      cd ../.. && pnpm install --frozen-lockfile=false
      pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PUBLIC_BASE_URL
        sync: false
